function fmt(n){if(n===0)return"0";const a=Math.abs(n),s=n<0?"-":"";if(a>=10000){const e=Math.floor(a/10000),m=Math.round(a%10000);return m===0?s+e+"억":s+e+"억 "+m.toLocaleString()+"만"}return s+Math.round(a).toLocaleString()+"만"}

function makeDef(sid,ta,aA,bA,tA){

const aCost=aA>0?Math.round(sd.cost*0.55*aA):0;const bCost=bA>0?Math.round(RC_COST*0.6*bA):0;const tCost=tA>0?Math.round(sd.cost*0.55*tA):0;const cc=bCc+aCost+bCost+tCost;
const iMin=350,iMax=500,aMin=18,aMax=150;

}

function getCalc(){

const diff=budget-tc,ratio=budget>0?(tc/budget)*100:0,over=diff<0;
return{ta,eA,eB,eT,terraceMax,ga,budget,tc,cC,cD,cT,cO,diff,ratio,over};
