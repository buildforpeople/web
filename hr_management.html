  return s;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showModal(html) {
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

/* ============================================================
   LOADER / TOAST / SYNC HELPERS
   ============================================================ */
function showLoader(text) {
  const root = document.getElementById('loaderRoot');
  if (!root) return;
  root.innerHTML = `
    <div class="loader-overlay">
      <div class="loader-spinner"></div>
      <div class="loader-text">${escapeHtml(text || '불러오는 중...')}</div>
    </div>
  `;
}
function hideLoader() {
  const root = document.getElementById('loaderRoot');
  if (root) root.innerHTML = '';
}
let _toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('syncToast');
  if (!el) return;
  el.className = 'sync-toast show' + (type ? ' ' + type : '');
  el.textContent = msg;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'sync-toast'; }, 2500);
}

/* ============================================================
   CENTRAL DB SYNC
   ============================================================ */
// Sheets DB에서 모든 테이블을 가져와서 DB 객체에 주입
async function syncFromDB() {
  const tables = await dbLoadAll();
  DB.requests = tables.requests || [];
  DB.overtime = tables.overtime || [];
  DB.mileage = tables.mileage || [];
  DB.tollgate = tables.tollgate || [];
  DB.cardUsage = tables.cardUsage || [];
  DB.welfare = tables.welfare || [];
  // vehicles: 배열 → 객체 맵 변환 ({empId: {fuelType, efficiency}})
  DB.vehicles = {};
  (tables.vehicles || []).forEach(v => {
    if (v.empId) DB.vehicles[v.empId] = { fuelType: v.fuelType || '휘발유', efficiency: Number(v.efficiency) || 12 };
  });
  // fuelPrices: 배열 → 객체 맵 ({month: {gasoline, diesel}})
  DB.fuelPrices = {};
  (tables.fuelPrices || []).forEach(f => {
    if (f.month) DB.fuelPrices[f.month] = { gasoline: Number(f.gasoline) || 0, diesel: Number(f.diesel) || 0 };
  });
  // tenureNotifications: 배열 → 객체 맵
  DB.tenureNotifications = {};
  (tables.tenureNotifications || []).forEach(t => {
    if (t.key) DB.tenureNotifications[t.key] = t.sentAt;
  });
  // legacyLeave: 직원별 앱 도입 전 사용 조정값 — employees에 주입
  (tables.legacyLeave || []).forEach(l => {
    const emp = DB.employees.find(e => e.id === l.empId);
    if (emp) {
      emp.legacyLeaveUsed = Number(l.used) || 0;
      emp.legacyBirthdayUsed = !!l.birthdayUsed;
    }
  });
  // 숫자 필드 정규화
  DB.requests.forEach(r => { r.days = Number(r.days) || 0; r.createdAt = Number(r.createdAt) || 0; if (r.decidedAt) r.decidedAt = Number(r.decidedAt); });
  DB.overtime.forEach(o => { o.hours = Number(o.hours) || 0; o.createdAt = Number(o.createdAt) || 0; });
  DB.mileage.forEach(m => { m.distance = Number(m.distance) || 0; m.createdAt = Number(m.createdAt) || 0; });
  DB.tollgate.forEach(t => { t.amount = Number(t.amount) || 0; t.createdAt = Number(t.createdAt) || 0; });
  DB.cardUsage.forEach(c => { c.amount = Number(c.amount) || 0; c.createdAt = Number(c.createdAt) || 0; if (c.sentAt) c.sentAt = Number(c.sentAt); });
  DB.welfare.forEach(w => { w.year = Number(w.year) || 0; w.totalAmount = Number(w.totalAmount) || 0; w.companyAmount = Number(w.companyAmount) || 0; w.createdAt = Number(w.createdAt) || 0; });
  save(DB);
}

// 기존 localStorage 데이터를 Sheets DB로 1회성 마이그레이션
async function migrateLocalToDB() {
  if (DB.migrated_to_sheets_v1) return false;
  const batches = [
    { table: 'requests',  rows: DB.requests || [] },
    { table: 'overtime',  rows: DB.overtime || [] },
    { table: 'mileage',   rows: DB.mileage || [] },
    { table: 'tollgate',  rows: DB.tollgate || [] },
    { table: 'cardUsage', rows: DB.cardUsage || [] },
    { table: 'welfare',   rows: DB.welfare || [] },
  ];
  let total = 0;
  for (const b of batches) {
    if (b.rows.length > 0) {
      await dbBulkInsert(b.table, b.rows);
      total += b.rows.length;
    }
  }
  // vehicles 맵 → 배열
  for (const [empId, v] of Object.entries(DB.vehicles || {})) {
    await dbUpsert('vehicles', 'empId', { empId, fuelType: v.fuelType, efficiency: v.efficiency });
  }
  // fuelPrices 맵 → 배열
  for (const [month, f] of Object.entries(DB.fuelPrices || {})) {
    await dbUpsert('fuelPrices', 'month', { month, gasoline: f.gasoline, diesel: f.diesel });
  }
  // tenureNotifications 맵 → 배열
  for (const [key, sentAt] of Object.entries(DB.tenureNotifications || {})) {
    await dbUpsert('tenureNotifications', 'key', { key, sentAt });
  }
  DB.migrated_to_sheets_v1 = true;
  save(DB);
  return total > 0;
}
